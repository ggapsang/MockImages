<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>$title</title>
  <link rel="stylesheet" href="/static/css/admin.css">
  <link rel="stylesheet" href="/static/css/mockimages.css">
</head>
<body>

<div class="app" style="grid-template-columns: 1fr; grid-template-rows: 32px 1fr 24px; grid-template-areas: 'topnav' 'main' 'status'">

  <div class="topnav">
    <div class="title">MockImages — 파일: <span id="hdr-station">$station_name</span></div>
    <div class="right-actions">
      <span class="nav-links">
        <a href="/">대시보드</a>
        <a href="/stations">개소 관리</a>
      </span>
      &nbsp;&nbsp;
      <button class="btn" id="btn-rescan">폴더 재스캔</button>
      <button class="btn" id="btn-refresh">새로고침</button>
    </div>
  </div>

  <div class="main">

    <div class="dropzone" id="dropzone">
      파일을 끌어다 놓거나 클릭하여 업로드 (multipart, multiple OK)
      <input type="file" id="file-input" multiple style="display:none">
    </div>

    <div class="actions-row">
      <span id="upload-status" class="muted">idle</span>
    </div>

    <table class="grid" id="tbl-files">
      <thead>
        <tr>
          <th>filename</th>
          <th>type</th>
          <th>size (bytes)</th>
          <th>uploaded</th>
          <th>last sent</th>
          <th>send #</th>
          <th></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>

  <div class="status">
    <span id="st-count">files: -</span>
    &nbsp;|&nbsp;
    <span id="st-refreshed">refreshed: -</span>
  </div>

</div>

<div id="toast-container"></div>
<script>
  window.STATION_NAME = "$station_name";
</script>
<script src="/static/js/common.js"></script>
<script src="/static/js/media.js"></script>
</body>
</html>
