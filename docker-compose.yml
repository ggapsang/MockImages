# MockImages – Development compose file
# ---------------------------------------
# Services:
#   mock-images-postgres   메타 DB (station, media_file)  host:2347 -> 5432
#   mock-images            송신기 + Admin UI (port 8081)
#
# Prerequisites:
#   1. SocketDaim compose가 먼저 올라와 있어야 함 (postgres + ingestion-gw + admin-ui).
#      cd ~/projects/SocketDaim && docker compose up -d
#   2. 그 때 생성된 socketdaim_gw-net에 join한다 (external).
#
# Bring up:
#   cd ~/projects/MockImages && docker compose up --build -d
# Logs (foreground):
#   docker compose up --build
# Wipe meta DB volume:
#   docker compose down -v
#
# Admin UI: http://localhost:8081/
#
# Build context는 부모 디렉토리(..)이며 SocketDaim/libs/gw_proto를 COPY하므로
# SocketDaim과 MockImages가 형제 디렉토리여야 한다 (MockSensor와 동일 가정).

services:

  mock-images-postgres:
    image: postgres:16
    container_name: mi-postgres
    environment:
      POSTGRES_DB: mock_images
      POSTGRES_USER: mock
      POSTGRES_PASSWORD: mockpw
    ports:
      - "2347:5432"
    volumes:
      - ./init_db.sql:/docker-entrypoint-initdb.d/01_init_db.sql:ro
      - mi-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mock -d mock_images"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gw-net

  mock-images:
    build:
      context: ..
      dockerfile: MockImages/Dockerfile
    container_name: mock-images
    environment:
      INGESTION_HOST: "ingestion-gw"
      INGESTION_PORT: "9000"
      PROTOCOL: "standard"
      META_DB_URL: "postgresql://mock:mockpw@mock-images-postgres:5432/mock_images"
      MEDIA_DIR: "/media"
      AMR_ID: "mock-amr-01"
      LOOP: "true"
      MODE: "raw"
      OUT_FPS: "15"
      JPEG_QUALITY: "85"
      OUTPUT_FORMAT: "mp4"
      JPEG_SEQ_MODE: "single_video"
      CHUNK_SIZE_KB: "512"
      INTERVAL_SEC: "5"
      CYCLE_INTERVAL_SEC: "0"
      STAY_MODE: "all_files"
      FILE_ORDER: "last_sent_asc"
      STARTUP_DELAY_SEC: "2"
      ADMIN_PORT: "8081"
      LOG_LEVEL: "INFO"
      # 부팅 시 송신 루프를 일시정지 상태로 시작한다.  Admin UI(:8081)의
      # [재개] 버튼 또는 `curl -X POST localhost:8081/api/runtime/resume`을
      # 명시적으로 호출해야 송신이 시작된다.  "false"로 두면 옛 동작(즉시 시작).
      STARTUP_PAUSED: "true"
    ports:
      - "8081:8081"
    volumes:
      - ./media:/media
    depends_on:
      mock-images-postgres:
        condition: service_healthy
    networks:
      - gw-net
    # 의도적으로 "no" — MockImages는 개발용 시험 송신기라 시스템 reboot이나
    # Docker 데몬 재시작 시 자동 부활해선 안 된다. 살아있는 동안만큼만
    # 송신하고, 명시적으로 다시 띄울 때만 동작한다. (2026-05-12 이전 사고:
    # restart=unless-stopped로 두었더니 부지불식간에 부활→무한 LOOP 송신으로
    # SocketDaim/storage가 1TB까지 차서 cleaner 14일 정책으론 회수 불가능
    # 상태가 됨. emergency_purge를 도입했지만 부활 자체를 막는 게 우선.)
    restart: "no"

volumes:
  mi-pgdata:

networks:
  gw-net:
    external: true
    name: socketdaim_gw-net
